
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Aviator Fixed</title>
<style>
body { background:#0b0e11; color:white; font-family:Arial; text-align:center; }
canvas { background:#141921; display:block; margin:20px auto; border:1px solid #333; }
button { padding:10px 20px; font-size:16px; }
</style>
</head>
<body>

<h2>🚀 Aviator Fixed Test</h2>
<div id="mult">1.00x</div>
<canvas id="c" width="400" height="200"></canvas>
<br>
<button onclick="startGame()">Start</button>

<script>
let canvas = document.getElementById("c");
let ctx = canvas.getContext("2d");

let mult = 1;
let running = false;
let x = 20;
let y = 180;

function draw(){
    ctx.clearRect(0,0,400,200);

    ctx.fillStyle="red";
    ctx.beginPath();
    ctx.arc(x,y,10,0,Math.PI*2);
    ctx.fill();

    if(running){
        mult += 0.02;
        x += 1;
        y -= 0.5;

        document.getElementById("mult").innerText = mult.toFixed(2)+"x";

        if(mult > 5){
            running = false;
            alert("Crashed at "+mult.toFixed(2));
        }
    }

    requestAnimationFrame(draw);
}

function startGame(){
    mult = 1;
    x = 20;
    y = 180;
    running = true;
}

draw();
</script>

</body>
</html>
