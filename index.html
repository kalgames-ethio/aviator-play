<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalgames Aviator</title>
    <style>
        body { 
            margin: 0; 
            background-color: #101115; 
            color: #fff; 
            font-family: 'Roboto', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            -webkit-user-select: none; 
            user-select: none; 
        }
        
        /* Top Header */
        .top-bar { 
            width: 100%; 
            max-width: 380px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 14px; 
            box-sizing: border-box; 
            background: #1b1c21; 
            border-bottom: 2px solid #141519; 
        }
        .logo { 
            font-size: 18px; 
            font-weight: 900; 
            color: #cb0130; 
            font-style: italic; 
        }
        .balance { 
            font-size: 15px; 
            color: #2ccb4a; 
            font-weight: bold; 
            background: #101115; 
            padding: 6px 14px; 
            border-radius: 20px; 
            border: 1px solid #2c2c2e; 
        }

        /* History Bar */
        #history-bar { 
            display: flex; 
            gap: 6px; 
            width: 100%; 
            max-width: 380px; 
            padding: 8px 12px; 
            overflow-x: auto; 
            background: #141519; 
            box-sizing: border-box; 
            scrollbar-width: none; 
        }
        #history-bar::-webkit-scrollbar { display: none; }
        .hist-item { 
            padding: 3px 9px; 
            border-radius: 10px; 
            font-size: 11px; 
            font-weight: bold; 
            color: #fff; 
            background: #1b1c21; 
            min-width: 45px; 
            text-align: center; 
            border: 1px solid #232429; 
        }
        .high { color: #c146e3; background: rgba(193, 70, 227, 0.15); border-color: rgba(193, 70, 227, 0.4); }
        .low { color: #3498db; background: rgba(52, 152, 219, 0.15); border-color: rgba(52, 152, 219, 0.4); }

        /* Game Screen Area */
        .game-canvas-area { 
            position: relative; 
            width: 95%; 
            max-width: 365px; 
            height: 220px; 
            margin-top: 8px; 
            background: #101115; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #232429; 
        }
        #gameCanvas { width: 100%; height: 100%; display: block; }
        
        #multiplier-overlay { 
            position: absolute; 
            top: 25%; 
            left: 0; 
            width: 100%; 
            text-align: center; 
            font-size: 52px; 
            font-weight: 900; 
            color: #fff; 
            z-index: 10; 
            font-family: sans-serif; 
        }
        .status-msg { 
            font-size: 13px; 
            color: #aeaeae; 
            position: absolute; 
            bottom: 25px; 
            width: 100%; 
            text-align: center; 
            z-index: 10; 
        }

        /* Betting Section */
        .bet-area { 
            width: 95%; 
            max-width: 365px; 
            margin-top: 10px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            box-sizing: border-box; 
        }
        .bet-panel { 
            background: #1b1c21; 
            padding: 12px; 
            border-radius: 14px; 
            border: 1px solid #232429; 
            display: grid; 
            grid-template-columns: 1fr 1.1fr; 
            gap: 12px; 
            box-sizing: border-box; 
        }
        
        .controls-left { 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
            width: 100%; 
        }
        .amount-control { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: #101115; 
            border-radius: 6px; 
            padding: 4px 8px; 
            border: 1px solid #2d303a; 
            height: 38px; 
            box-sizing: border-box; 
        }
        .minus-btn, .plus-btn { 
            background: #232429; 
            border: none; 
            color: #fff; 
            width: 26px; 
            height: 26px; 
            border-radius: 50%; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .amount-input { 
            background: none; 
            border: none; 
            color: #fff; 
            font-size: 16px; 
            font-weight: bold; 
            width: 55px; 
            text-align: center; 
            outline: none; 
        }
        
        .quick-chips { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 4px; 
        }
        .chip-btn { 
            background: #101115; 
            border: 1px solid #232429; 
            color: #9a9da4; 
            padding: 5px 0; 
            font-size: 12px; 
            font-weight: bold; 
            border-radius: 4px; 
            cursor: pointer; 
        }

        /* 🟢 ኒዮን ሎሚ አረንጓዴ BET አዝራር */
        .btn-container { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            height: 100%; 
        }
        .bet-button { 
            background: #2ccb4a; 
            color: #fff; 
            border: none; 
            border-radius: 12px; 
            width: 100%; 
            height: 100%; 
            min-height: 76px; 
            font-size: 22px; 
            font-weight: 900; 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            line-height: 1.2; 
            box-shadow: 0 4px 12px rgba(44, 203, 74, 0.35);
        }
        .bet-button span { 
            font-size: 14px; 
            font-weight: bold; 
            color: #fff; 
            margin-top: 2px; 
        }
        
        .bet-button.waiting { background: #e67e22; box-shadow: 0 4px 10px rgba(230, 126, 34, 0.3); }
        .bet-button.cashout { background: #cb0130; box-shadow: 0 4px 10px rgba(203, 1, 48, 0.3); }
    </style>
</head>
<body>

    <div class="top-bar">
        <span class="logo">Aviator</span>
        <span class="balance" id="player-balance">1,000.00 ETB</span>
    </div>

    <div id="history-bar"></div>

    <div class="game-canvas-area">
        <canvas id="gameCanvas" width="365" height="220"></canvas>
        <div id="multiplier-overlay">1.00x</div>
        <div class="status-msg" id="status-text">አውሮፕላኑ እየተዘጋጀ ነው...</div>
    </div>

    <div class="bet-area">
        <div class="bet-panel">
            <div class="controls-left">
                <div class="amount-control">
                    <button class="minus-btn" onclick="adjustAmount(1, -1)">-</button>
                    <input type="number" class="amount-input" id="bet-amount-1" value="4">
                    <button class="plus-btn" onclick="adjustAmount(1, 1)">+</button>
                </div>
                <div class="quick-chips">
                    <button class="chip-btn" onclick="setAmount(1, 4)">4</button>
                    <button class="chip-btn" onclick="setAmount(1, 10)">10</button>
                    <button class="chip-btn" onclick="setAmount(1, 40)">40</button>
                    <button class="chip-btn" onclick="setAmount(1, 100)">100</button>
                </div>
            </div>
            <div class="btn-container">
                <button class="bet-button" id="btn-1" onclick="placeBet(1)">BET<br><span id="sub-1">4.00 ETB</span></button>
            </div>
        </div>

        <div class="bet-panel">
            <div class="controls-left">
                <div class="amount-control">
                    <button class="minus-btn" onclick="adjustAmount(2, -1)">-</button>
                    <input type="number" class="amount-input" id="bet-amount-2" value="4">
                    <button class="plus-btn" onclick="adjustAmount(2, 1)">+</button>
                </div>
                <div class="quick-chips">
                    <button class="chip-btn" onclick="setAmount(2, 4)">4</button>
                    <button class="chip-btn" onclick="setAmount(2, 10)">10</button>
                    <button class="chip-btn" onclick="setAmount(2, 40)">40</button>
                    <button class="chip-btn" onclick="setAmount(2, 100)">100</button>
                </div>
            </div>
            <div class="btn-container">
                <button class="bet-button" id="btn-2" onclick="placeBet(2)">BET<br><span id="sub-2">4.00 ETB</span></button>
            </div>
        </div>
    </div>

    <script>
        const balanceElement = document.getElementById('player-balance');
        const historyContainer = document.getElementById('history-bar');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const multiplierOverlay = document.getElementById('multiplier-overlay');
        const statusText = document.getElementById('status-text');

        let balance = 1000.00;
        let isFlightInProgress = false;
        let currentMultiplier = 1.00;
        let crashPoint = 0;
        let flightProgress = 0; // 0 to 1
        
        let bet1 = { amount: 0, status: 'idle' };
        let bet2 = { amount: 0, status: 'idle' };

        const pastResults = [1.45, 2.70, 1.12, 5.84, 1.22, 19.50];
        function renderHistory() {
            historyContainer.innerHTML = '';
            pastResults.slice(-7).reverse().forEach(res => {
                const item = document.createElement('div');
                item.className = 'hist-item ' + (res >= 2 ? 'high' : 'low');
                item.innerText = res.toFixed(2) + 'x';
                historyContainer.appendChild(item);
            });
        }

        // የጀርባ ጨረር ከመሃል ተነስቶ የሚወጣ
        function drawBackground() {
            ctx.fillStyle = '#101115';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            const numRays = 32;
            const rayAngle = (Math.PI * 2) / numRays;
            for (let i = 0; i < numRays; i++) {
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, 400, i * rayAngle, (i + 1) * rayAngle);
                ctx.lineTo(0, 0);
                ctx.fillStyle = i % 2 === 0 ? '#14161c' : '#101115';
                ctx.fill();
            }
            ctx.restore();

            // የጎን ነጠብጣብ የግራፍ መስመሮች
            ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
            for (let x = 30; x < canvas.width; x += 15) ctx.fillRect(x, canvas.height - 20, 1.5, 1.5);
            for (let y = 15; y < canvas.height - 20; y += 15) ctx.fillRect(25, y, 1.5, 1.5);
        }

        // ✈️ የኢቪዬተር ጄት አውሮፕላን ስዕል
        function drawAviatorJet(x, y) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(-0.05); // ወደ ላይ ቀና እንዲል

            // ዋና አካል (Fuselage)
            ctx.fillStyle = '#cb0130';
            ctx.beginPath();
            ctx.moveTo(20, 0);
            ctx.quadraticCurveTo(8, -6, -15, -4);
            ctx.lineTo(-20, -10);
            ctx.lineTo(-23, -10);
            ctx.lineTo(-20, 0);
            ctx.lineTo(-23, 10);
            ctx.lineTo(-20, 10);
            ctx.quadraticCurveTo(8, 6, 20, 0);
            ctx.fill();

            // ወደ ኋላ የዞሩ ክንፎች
            ctx.fillStyle = '#b00128';
            ctx.beginPath();
            ctx.moveTo(-2, -3);
            ctx.lineTo(-10, -20);
            ctx.lineTo(-15, -20);
            ctx.lineTo(-7, -3);
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(-2, 3);
            ctx.lineTo(-10, 20);
            ctx.lineTo(-15, 20);
            ctx.lineTo(-7, 3);
            ctx.fill();

            // የሞተር ፍንጣቂ ነጭ ብርሃን (Glow)
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.beginPath();
            ctx.arc(-21, 0, 3.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function drawGame() {
            drawBackground();
            
            if (isFlightInProgress) {
                // 📍 ትክክለኛው የኤቪዬተር ጥምዝ መስመር መነሻ (Bezier Curve)
                let startX = 25;
                let startY = canvas.height - 35;
                let endX = startX + flightProgress * (canvas.width - 75);
                let endY = startY - Math.pow(flightProgress, 2.2) * (canvas.height - 75);

                // የስስ ቀይ ጥላ መሙያ (Gradient Area)
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                let cpX = startX + (endX - startX) * 0.6;
                let cpY = startY;
                ctx.quadraticCurveTo(cpX, cpY, endX, endY);
                ctx.lineTo(endX, startY);
                ctx.closePath();

                let fillGrad = ctx.createLinearGradient(0, endY, 0, startY);
                fillGrad.addColorStop(0, 'rgba(203, 1, 48, 0.22)');
                fillGrad.addColorStop(1, 'rgba(203, 1, 48, 0.0)');
                ctx.fillStyle = fillGrad;
                ctx.fill();

                // ቀጭኑ ደማቅ ቀይ መስመር
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.quadraticCurveTo(cpX, cpY, endX, endY);
                ctx.strokeStyle = '#df0237';
                ctx.lineWidth = 2.5;
                ctx.stroke();

                // አውሮፕላኑን በጥምዝ መስመሩ ጫፍ ላይ መሳል
                drawAviatorJet(endX, endY);
            }
        }

        function startNewRound() {
            flightProgress = 0;
            currentMultiplier = 1.00;
            
            let rand = Math.random();
            if (rand < 0.08) crashPoint = 1.00; 
            else crashPoint = (1 + 7 * Math.random()).toFixed(2); 

            isFlightInProgress = true;
            statusText.innerText = "";
            multiplierOverlay.style.color = "#fff";

            handleRoundStartBets();
            flightSequence();
        }

        function flightSequence() {
            if (currentMultiplier < crashPoint && isFlightInProgress) {
                flightProgress += 0.0035; // የበረራ ማደጊያ ፍጥነት
                currentMultiplier = (1.00 + Math.pow(flightProgress * 4, 2.2)).toFixed(2);
                multiplierOverlay.innerText = currentMultiplier + "x";
                
                updateCashoutLabels();
                drawGame();
                requestAnimationFrame(flightSequence);
            } else if (isFlightInProgress) {
                endRound();
            }
        }

        function endRound() {
            isFlightInProgress = false;
            multiplierOverlay.innerText = "FLEW AWAY!";
            multiplierOverlay.style.color = "#cb0130";
            statusText.innerText = "ቀጣይ ዙር በ 4 ሰከንድ ውስጥ ይጀምራል...";
            
            pastResults.push(parseFloat(currentMultiplier));
            renderHistory();
            resetPanels();
            
            setTimeout(startNewRound, 4000);
        }

        function placeBet(id) {
            let btn = document.getElementById('btn-' + id);
            let sub = document.getElementById('sub-' + id);
            let amt = parseInt(document.getElementById('bet-amount-' + id).value);
            let currentBet = id === 1 ? bet1 : bet2;

            if (!isFlightInProgress && currentBet.status === 'idle') {
                if (balance >= amt) {
                    currentBet.amount = amt;
                    currentBet.status = 'waiting';
                    btn.childNodes[0].nodeValue = "WAITING";
                    sub.innerText = "Cancel";
                    btn.className = "bet-button waiting";
                }
            } else if (!isFlightInProgress && currentBet.status === 'waiting') {
                currentBet.status = 'idle';
                btn.childNodes[0].nodeValue = "BET";
                sub.innerText = amt.toFixed(2) + " ETB";
                btn.className = "bet-button";
            } else if (isFlightInProgress && currentBet.status === 'active') {
                let winAmt = currentBet.amount * currentMultiplier;
                balance += winAmt;
                balanceElement.innerText = balance.toFixed(2) + " ETB";
                currentBet.status = 'idle';
                btn.childNodes[0].nodeValue = "BET";
                sub.innerText = amt.toFixed(2) + " ETB";
                btn.className = "bet-button";
                alert("አሸንፈዋል! +" + winAmt.toFixed(2) + " ETB");
            }
        }

        function handleRoundStartBets() {
            [1, 2].forEach(id => {
                let currentBet = id === 1 ? bet1 : bet2;
                let btn = document.getElementById('btn-' + id);
                let sub = document.getElementById('sub-' + id);
                if (currentBet.status === 'waiting') {
                    balance -= currentBet.amount;
                    balanceElement.innerText = balance.toFixed(2) + " ETB";
                    currentBet.status = 'active';
                    btn.childNodes[0].nodeValue = "CASH OUT";
                    btn.className = "bet-button cashout";
                }
            });
        }

        function updateCashoutLabels() {
            if (bet1.status === 'active') document.getElementById('sub-1').innerText = (bet1.amount * currentMultiplier).toFixed(2) + " ETB";
            if (bet2.status === 'active') document.getElementById('sub-2').innerText = (bet2.amount * currentMultiplier).toFixed(2) + " ETB";
        }

        function resetPanels() {
            [1, 2].forEach(id => {
                let currentBet = id === 1 ? bet1 : bet2;
                if(currentBet.status !== 'waiting') {
                    let btn = document.getElementById('btn-' + id);
                    let sub = document.getElementById('sub-' + id);
                    let amt = document.getElementById('bet-amount-' + id).value;
                    btn.childNodes[0].nodeValue = "BET";
                    sub.innerText = parseFloat(amt).toFixed(2) + " ETB";
                    btn.className = "bet-button";
                }
            });
            bet1 = { amount: 0, status: 'idle' };
            bet2 = { amount: 0, status: 'idle' };
        }

        function adjustAmount(id, val) {
            let input = document.getElementById('bet-amount-' + id);
            let current = parseInt(input.value) || 0;
            if (current + val >= 1) {
                input.value = current + val;
                updateButtonSub(id, current + val);
            }
        }

        function setAmount(id, val) {
            document.getElementById('bet-amount-' + id).value = val;
            updateButtonSub(id, val);
        }

        function updateButtonSub(id, val) {
            let currentBet = id === 1 ? bet1 : bet2;
            if (currentBet.status === 'idle') {
                document.getElementById('sub-' + id).innerText = parseFloat(val).toFixed(2) + " ETB";
            }
        }

        window.onload = function() {
            renderHistory();
            drawGame();
            startNewRound();
        }
    </script>
</body>
</html>
