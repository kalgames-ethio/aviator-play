<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalgames Aviator Pro Real-Edition</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            background-color: #101115; 
            color: #fff; 
            font-family: 'Roboto', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            -webkit-user-select: none; 
            user-select: none; 
        }
        
        /* Top Navigation Header */
        .top-bar { 
            width: 100%; 
            max-width: 385px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 14px; 
            background: #1b1c21; 
            border-bottom: 2px solid #141519; 
        }
        .logo { 
            font-size: 19px; 
            font-weight: 900; 
            color: #cb0130; 
            font-style: italic; 
        }
        .balance { 
            font-size: 14px; 
            color: #2ccb4a; 
            font-weight: bold; 
            background: #101115; 
            padding: 6px 14px; 
            border-radius: 20px; 
            border: 1px solid #2d303a; 
        }

        /* Multiplier History Bar */
        #history-bar { 
            display: flex; 
            gap: 6px; 
            width: 100%; 
            max-width: 385px; 
            padding: 8px 12px; 
            overflow-x: auto; 
            background: #141519; 
            scrollbar-width: none; 
        }
        #history-bar::-webkit-scrollbar { display: none; }
        .hist-item { 
            padding: 3px 9px; 
            border-radius: 10px; 
            font-size: 11px; 
            font-weight: bold; 
            color: #fff; 
            min-width: 48px; 
            text-align: center; 
            border: 1px solid #232429; 
        }
        .hist-blue { color: #3498db; background: rgba(52, 152, 219, 0.12); border-color: rgba(52, 152, 219, 0.3); }
        .hist-purple { color: #9b59b6; background: rgba(155, 89, 182, 0.12); border-color: rgba(155, 89, 182, 0.3); }
        .hist-magenta { color: #c146e3; background: rgba(193, 70, 227, 0.15); border-color: rgba(193, 70, 227, 0.4); }

        /* Game Screen Canvas Box Area */
        .game-canvas-area { 
            position: relative; 
            width: 96%; 
            max-width: 370px; 
            height: 190px; 
            margin-top: 6px; 
            background: #101115; 
            border-radius: 8px; 
            overflow: hidden; 
            border: 1px solid #1c1d22; 
        }
        #gameCanvas { width: 100%; height: 100%; display: block; }
        
        #multiplier-overlay { 
            position: absolute; 
            top: 30%; 
            left: 0; 
            width: 100%; 
            text-align: center; 
            font-size: 52px; 
            font-weight: 900; 
            color: #fff; 
            z-index: 10; 
        }

        /* Flew Away Notification Banner */
        #flew-away-banner {
            display: none;
            position: absolute;
            top: 30%;
            left: 5%;
            width: 90%;
            background: rgba(203, 1, 48, 0.95);
            color: #fff;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            z-index: 20;
            box-shadow: 0 4px 20px rgba(203, 1, 48, 0.5);
        }
        .flew-title { font-size: 13px; font-weight: bold; color: rgba(255,255,255,0.8); text-transform: uppercase; margin-bottom: 2px; }
        .flew-val { font-size: 34px; font-weight: 900; }

        /* Waiting Container with Progress Line */
        #waiting-container {
            display: none;
            position: absolute;
            top: 32%;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 25;
        }
        .waiting-text {
            font-size: 14px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .progress-bar-bg {
            width: 60%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            margin: 0 auto;
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: #cb0130;
            border-radius: 2px;
        }

        /* Input Dashboard Panel Configurator */
        .bet-area { 
            width: 96%; 
            max-width: 370px; 
            margin-top: 8px; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
        }
        .bet-panel { 
            background: #1b1c21; 
            padding: 10px; 
            border-radius: 12px; 
            border: 1px solid #232429; 
        }

        .panel-header-tabs {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .tab-group { display: flex; gap: 6px; background: #141519; padding: 2px; border-radius: 12px; }
        .sub-tab {
            font-size: 11px;
            color: #757881;
            font-weight: bold;
            padding: 3px 14px;
            border-radius: 10px;
            cursor: pointer;
        }
        .sub-tab.active { color: #fff; background: #2c2d34; }

        /* 🔄 አዲሱ የ Auto Cashout ማብሪያ ቶግል ስዊች (Toggle Switch) */
        .auto-cashout-container {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            font-weight: bold;
            color: #9a9da4;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 30px;
            height: 16px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #232429; transition: .3s; border-radius: 16px; border: 1px solid #2d303a;
        }
        .slider:before {
            position: absolute; content: ""; height: 10px; width: 10px; left: 2px; bottom: 2px;
            background-color: #9a9da4; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #2ccb4a; }
        input:checked + .slider:before { transform: translateX(14px); background-color: #fff; }

        .auto-val-input {
            width: 42px; background: #101115; border: 1px solid #2d303a; color: #2ccb4a;
            font-size: 11px; font-weight: bold; text-align: center; border-radius: 4px; padding: 1px; outline: none;
        }

        .panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .controls-left { display: flex; flex-direction: column; gap: 5px; }
        
        .amount-control-wrapper {
            display: flex;
            align-items: center;
            background: #101115; 
            border-radius: 6px; 
            border: 1px solid #2d303a; 
            padding: 2px 4px;
            height: 34px;
        }
        .minus-btn, .plus-btn { 
            background: #232429; border: none; color: #fff; width: 22px; height: 22px; 
            border-radius: 50%; font-size: 15px; font-weight: bold; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; 
        }
        .amount-input { 
            background: none; border: none; color: #fff; font-size: 14px; 
            font-weight: bold; width: 45px; text-align: center; outline: none; 
        }
        .quick-math-actions { display: flex; gap: 2px; margin-left: auto; }
        .math-btn {
            background: #1f2026; border: 1px solid #2d303a; color: #9a9da4;
            font-size: 9px; font-weight: bold; padding: 3px 5px; border-radius: 3px; cursor: pointer;
        }

        .quick-chips { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; }
        .chip-btn { 
            background: #101115; border: 1px solid #232429; color: #9a9da4; 
            padding: 4px 0; font-size: 11px; font-weight: bold; border-radius: 4px; cursor: pointer; 
        }

        .btn-container { display: flex; align-items: center; justify-content: center; width: 100%; }
        .bet-button { 
            background: #2ccb4a; color: #fff; border: none; border-radius: 8px; 
            width: 100%; height: 100%; min-height: 58px; font-size: 19px; font-weight: 900; 
            cursor: pointer; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; line-height: 1.1; box-shadow: 0 4px 10px rgba(44, 203, 74, 0.3);
        }
        .bet-button span { font-size: 12px; font-weight: bold; color: rgba(255, 255, 255, 0.9); margin-top: 1px; }
        
        .bet-button.waiting { background: #e67e22; box-shadow: 0 4px 10px rgba(230, 126, 34, 0.3); }
        .bet-button.cashout { background: #cb0130; box-shadow: 0 4px 10px rgba(203, 1, 48, 0.3); }

        /* Central Tabs */
        .mid-nav-tabs {
            width: 96%;
            max-width: 370px;
            background: #141519;
            display: flex;
            justify-content: space-around;
            padding: 4px;
            border-radius: 20px;
            margin-top: 12px;
            border: 1px solid #1c1d22;
        }
        .mid-tab { color: #9a9da4; font-size: 11px; font-weight: bold; padding: 5px 16px; border-radius: 15px; cursor: pointer; }
        .mid-tab.active { color: #fff; background: #2c2d34; }

        /* 📊 አዲሱ የተጫዋቾች ውርርድ ዝርዝር (Live Bets Table Board) */
        .live-bets-container {
            width: 96%; max-width: 370px; background: #141519; margin-top: 6px;
            border-radius: 8px; padding: 8px; border: 1px solid #1c1d22; margin-bottom: 20px;
        }
        .bets-summary-header { display: flex; justify-content: space-between; font-size: 11px; color: #9a9da4; margin-bottom: 6px; font-weight: bold; }
        .bets-list-table { width: 100%; border-collapse: collapse; }
        .bets-list-table th { text-align: left; font-size: 10px; color: #757881; padding-bottom: 4px; border-bottom: 1px solid #1c1d22; }
        .bets-list-table td { font-size: 11px; padding: 5px 0; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .user-id-col { color: #9a9da4; font-weight: 500; }
        .user-mult-badge { background: rgba(44, 203, 74, 0.15); color: #2ccb4a; padding: 1px 5px; border-radius: 6px; font-weight: bold; font-size: 10px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <span class="logo">Aviator</span>
        <span class="balance" id="player-balance">1,000.00 ETB</span>
    </div>

    <div id="history-bar"></div>

    <div class="game-canvas-area">
        <canvas id="gameCanvas" width="370" height="190"></canvas>
        <div id="multiplier-overlay">1.00x</div>
        
        <div id="flew-away-banner">
            <div class="flew-title">Flew Away</div>
            <div class="flew-val" id="flew-val-text">1.00x</div>
        </div>

        <div id="waiting-container">
            <div class="waiting-text">Waiting for next round</div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-bar-fill-id"></div>
            </div>
        </div>
    </div>

    <div class="bet-area">
        <div class="bet-panel">
            <div class="panel-header-tabs">
                <div class="tab-group">
                    <div class="sub-tab active">Bet</div>
                    <div class="sub-tab">Auto</div>
                </div>
                <div class="auto-cashout-container">
                    <span>Auto Cashout</span>
                    <label class="switch">
                        <input type="checkbox" id="auto-cash-check-1">
                        <span class="slider"></span>
                    </label>
                    <input type="text" class="auto-val-input" id="auto-cash-val-1" value="2.00">
                </div>
            </div>
            <div class="panel-grid">
                <div class="controls-left">
                    <div class="amount-control-wrapper">
                        <button class="minus-btn" onclick="adjustAmount(1, -1)">-</button>
                        <input type="number" class="amount-input" id="bet-amount-1" value="4">
                        <button class="plus-btn" onclick="adjustAmount(1, 1)">+</button>
                        <div class="quick-math-actions">
                            <button class="math-btn" onclick="multiplyAmount(1, 2)">X2</button>
                            <button class="math-btn" onclick="multiplyAmount(1, 0.5)">/2</button>
                        </div>
                    </div>
                    <div class="quick-chips">
                        <button class="chip-btn" onclick="setAmount(1, 4)">4</button>
                        <button class="chip-btn" onclick="setAmount(1, 10)">10</button>
                        <button class="chip-btn" onclick="setAmount(1, 40)">40</button>
                        <button class="chip-btn" onclick="setAmount(1, 100)">100</button>
                    </div>
                </div>
                <div class="btn-container">
                    <button class="bet-button" id="btn-1" onclick="placeBet(1)">BET<br><span id="sub-1">4.00 ETB</span></button>
                </div>
            </div>
        </div>

        <div class="bet-panel">
            <div class="panel-header-tabs">
                <div class="tab-group">
                    <div class="sub-tab active">Bet</div>
                    <div class="sub-tab">Auto</div>
                </div>
                <div class="auto-cashout-container">
                    <span>Auto Cashout</span>
                    <label class="switch">
                        <input type="checkbox" id="auto-cash-check-2">
                        <span class="slider"></span>
                    </label>
                    <input type="text" class="auto-val-input" id="auto-cash-val-2" value="2.00">
                </div>
            </div>
            <div class="panel-grid">
                <div class="controls-left">
                    <div class="amount-control-wrapper">
                        <button class="minus-btn" onclick="adjustAmount(2, -1)">-</button>
                        <input type="number" class="amount-input" id="bet-amount-2" value="4">
                        <button class="plus-btn" onclick="adjustAmount(2, 1)">+</button>
                        <div class="quick-math-actions">
                            <button class="math-btn" onclick="multiplyAmount(2, 2)">X2</button>
                            <button class="math-btn" onclick="multiplyAmount(2, 0.5)">/2</button>
                        </div>
                    </div>
                    <div class="quick-chips">
                        <button class="chip-btn" onclick="setAmount(2, 4)">4</button>
                        <button class="chip-btn" onclick="setAmount(2, 10)">10</button>
                        <button class="chip-btn" onclick="setAmount(2, 40)">40</button>
                        <button class="chip-btn" onclick="setAmount(2, 100)">100</button>
                    </div>
                </div>
                <div class="btn-container">
                    <button class="bet-button" id="btn-2" onclick="placeBet(2)">BET<br><span id="sub-2">4.00 ETB</span></button>
                </div>
            </div>
        </div>
    </div>

    <div class="mid-nav-tabs">
        <div class="mid-tab active">All Bets</div>
        <div class="mid-tab">My Bets</div>
        <div class="mid-tab">Top</div>
    </div>

    <div class="live-bets-container">
        <div class="bets-summary-header">
            <span>All Bets: <span style="color:#2ccb4a;" id="total-bets-count">18</span></span>
            <span style="color: #757881;">Total Bet: <span style="color:#fff;">1,420 ETB</span></span>
        </div>
        <table class="bets-list-table">
            <thead>
                <tr>
                    <th>User</th>
                    <th>Bet (ETB)</th>
                    <th>Mult.</th>
                    <th>Cash out</th>
                </tr>
            </thead>
            <tbody id="bets-rows-container">
                </tbody>
        </div>
    </div>

    <script>
        const balanceElement = document.getElementById('player-balance');
        const historyContainer = document.getElementById('history-bar');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const multiplierOverlay = document.getElementById('multiplier-overlay');
        const flewBanner = document.getElementById('flew-away-banner');
        const flewValText = document.getElementById('flew-val-text');
        const waitingContainer = document.getElementById('waiting-container');
        const progressBarFill = document.getElementById('progress-bar-fill-id');
        const betsRowsContainer = document.getElementById('bets-rows-container');

        let balance = 1000.00;
        let isFlightInProgress = false;
        let currentMultiplier = 1.00;
        let crashPoint = 0;
        let flightProgress = 0; 
        
        let bet1 = { amount: 0, status: 'idle' };
        let bet2 = { amount: 0, status: 'idle' };

        const pastResults = [1.32, 5.40, 1.02, 18.25, 2.11, 1.76, 31.40];
        
        // 📊 የውሸት ተጫዋቾች ስም ዝርዝር ለታችኛው ቦርድ
        const fakeUserNames = ["k***l", "a***m", "b***e", "t***f", "y***ነ", "m***k", "g***d", "s***a", "j***o", "r***u"];

        function renderHistory() {
            historyContainer.innerHTML = '';
            pastResults.slice(-7).reverse().forEach(res => {
                const item = document.createElement('div');
                if (res < 2.00) item.className = 'hist-item hist-blue';
                else if (res >= 2.00 && res < 10.00) item.className = 'hist-item hist-purple';
                else item.className = 'hist-item hist-magenta';
                
                item.innerText = res.toFixed(2) + 'x';
                historyContainer.appendChild(item);
            });
        }

        // 📊 ተጫዋቾችን በየዙሩ በራንደም ማመንጫ ሰንጠረዥ
        function generateLiveBetsBoard() {
            betsRowsContainer.innerHTML = '';
            let count = 12 + Math.floor(Math.random() * 10);
            document.getElementById('total-bets-count').innerText = count;

            for(let i=0; i<count; i++) {
                let name = fakeUserNames[Math.floor(Math.random() * fakeUserNames.length)] + Math.floor(Math.random()*99);
                let amt = [4, 10, 20, 40, 100, 200][Math.floor(Math.random()*6)];
                
                let row = document.createElement('tr');
                row.innerHTML = `
                    <td class="user-id-col">👤 ${name}</td>
                    <td>${amt}.00</td>
                    <td><span class="user-mult-badge" id="user-m-${i}">-</span></td>
                    <td id="user-c-${i}">-</td>
                `;
                betsRowsContainer.appendChild(row);
            }
        }

        // 📊 በረራው ሲቀጥል የሌሎች ሰዎችን ውጤት በዘፈቀደ Cashout እንዲያደርጉ ማድረጊያ
        function updateLiveBetsBoardState() {
            let rowsCount = betsRowsContainer.children.length;
            for(let i=0; i<rowsCount; i++) {
                let mBadge = document.getElementById(`user-m-${i}`);
                let cCell = document.getElementById(`user-c-${i}`);
                if(mBadge && mBadge.innerText === "-" && Math.random() < 0.04) {
                    let randCash = (1.1 + Math.random() * (currentMultiplier - 1.1)).toFixed(2);
                    if (parseFloat(randCash) <= parseFloat(currentMultiplier)) {
                        mBadge.innerText = randCash + "x";
                        let betAmt = parseFloat(betsRowsContainer.children[i].children[1].innerText);
                        cCell.innerText = (betAmt * randCash).toFixed(1) + " ETB";
                        cCell.style.color = "#2ccb4a";
                        cCell.style.fontWeight = "bold";
                    }
                }
            }
        }

        function drawBackground() {
            ctx.fillStyle = '#101115';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            const numRays = 32;
            const rayAngle = (Math.PI * 2) / numRays;
            for (let i = 0; i < numRays; i++) {
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, 400, i * rayAngle, (i + 1) * rayAngle);
                ctx.lineTo(0, 0);
                ctx.fillStyle = i % 2 === 0 ? '#131419' : '#101115';
                ctx.fill();
            }
            ctx.restore();

            ctx.fillStyle = 'rgba(255, 255, 255, 0.04)';
            for (let x = 20; x < canvas.width; x += 16) ctx.fillRect(x, canvas.height - 20, 1.2, 1.2);
            for (let y = 10; y < canvas.height - 20; y += 16) ctx.fillRect(20, y, 1.2, 1.2);
        }

        function drawAviatorJet(x, y) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(-0.06); 

            ctx.fillStyle = '#cb0130';
            ctx.beginPath();
            ctx.moveTo(20, 0);
            ctx.quadraticCurveTo(8, -6, -12, -4);
            ctx.lineTo(-18, -9); ctx.lineTo(-21, -9); ctx.lineTo(-18, 0); ctx.lineTo(-21, 9); ctx.lineTo(-18, 9);
            ctx.quadraticCurveTo(-12, 6, 20, 0);
            ctx.fill();

            ctx.fillStyle = '#ad0229';
            ctx.beginPath(); ctx.moveTo(-1, -3); ctx.lineTo(-10, -20); ctx.lineTo(-15, -20); ctx.lineTo(-6, -3); ctx.fill();
            ctx.beginPath(); ctx.moveTo(-1, 3); ctx.lineTo(-10, 20); ctx.lineTo(-15, 20); ctx.lineTo(-6, 3); ctx.fill();

            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(-19, 0, 3, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }

        function drawGame() {
            drawBackground();
            
            if (isFlightInProgress) {
                let startX = 20;
                let startY = canvas.height - 25;
                let endX = startX + flightProgress * (canvas.width - 65);
                let endY = startY - Math.pow(flightProgress, 2.1) * (canvas.height - 65);

                // 🔄 አውሮፕላኑ ሲበር ከበስተጀርባው የሚፈጠረው ቀይ የጭስ ጥላ (Glow Gradient Effect)
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                let cpX = startX + (endX - startX) * 0.62;
                let cpY = startY;
                ctx.quadraticCurveTo(cpX, cpY, endX, endY);
                ctx.lineTo(endX, startY);
                ctx.closePath();

                let fillGrad = ctx.createLinearGradient(0, endY, 0, startY);
                fillGrad.addColorStop(0, 'rgba(203, 1, 48, 0.28)'); // ቀይ የጭስ ጥላ
                fillGrad.addColorStop(0.5, 'rgba(203, 1, 48, 0.08)');
                fillGrad.addColorStop(1, 'rgba(203, 1, 48, 0.0)');
                ctx.fillStyle = fillGrad;
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.quadraticCurveTo(cpX, cpY, endX, endY);
                ctx.strokeStyle = '#e10237';
                ctx.lineWidth = 2.8;
                ctx.stroke();

                drawAviatorJet(endX, endY);
            }
        }

        function startWaitingPeriod() {
            flewBanner.style.display = "none";
            multiplierOverlay.style.display = "none";
            waitingContainer.style.display = "block";
            
            generateLiveBetsBoard(); // አዲስ የተጫዋቾች ቦርድ ማዘጋጀት
            
            let loadProgress = 0;
            progressBarFill.style.width = "0%";

            let loadInterval = setInterval(() => {
                loadProgress += 2;
                progressBarFill.style.width = loadProgress + "%";
                
                if (loadProgress >= 100) {
                    clearInterval(loadInterval);
                    waitingContainer.style.display = "none";
                    startNewRound();
                }
            }, 100); 
        }

        function startNewRound() {
            multiplierOverlay.style.display = "block";
            flightProgress = 0;
            currentMultiplier = 1.00;
            
            let rand = Math.random();
            if (rand < 0.08) crashPoint = 1.00; 
            else crashPoint = (1 + 12 * Math.random()).toFixed(2); 

            isFlightInProgress = true;
            multiplierOverlay.style.color = "#fff";

            handleRoundStartBets();
            flightSequence();
        }

        function flightSequence() {
            if (currentMultiplier < crashPoint && isFlightInProgress) {
                flightProgress += 0.0030; 
                currentMultiplier = (1.00 + Math.pow(flightProgress * 4, 2.1)).toFixed(2);
                multiplierOverlay.innerText = currentMultiplier + "x";
                
                checkAutoCashouts(); // የ Auto Cashout ማረጋገጫ
                updateCashoutLabels();
                updateLiveBetsBoardState(); // የታችኛውን ተጫዋቾች ስቴት ማዘመን
                drawGame();
                requestAnimationFrame(flightSequence);
            } else if (isFlightInProgress) {
                endRound();
            }
        }

        // 🔄 Auto Cashout ማብሪያው በርቶ ከሆነ በራሱ እንዲያወጣ ማድረጊያ ዘዴ
        function checkAutoCashouts() {
            [1, 2].forEach(id => {
                let currentBet = id === 1 ? bet1 : bet2;
                let autoCheck = document.getElementById('auto-cash-check-' + id).checked;
                let autoVal = parseFloat(document.getElementById('auto-cash-val-' + id).value) || 2.00;

                if (isFlightInProgress && currentBet.status === 'active' && autoCheck) {
                    if (parseFloat(currentMultiplier) >= autoVal) {
                        triggerCashoutSuccess(id);
                    }
                }
            });
        }

        function endRound() {
            isFlightInProgress = false;
            
            multiplierOverlay.style.display = "none";
            flewValText.innerText = currentMultiplier + "x";
            flewBanner.style.display = "block";
            
            pastResults.push(parseFloat(currentMultiplier));
            renderHistory();
            resetPanels();
            
            setTimeout(startWaitingPeriod, 3000);
        }

        function placeBet(id) {
            let btn = document.getElementById('btn-' + id);
            let sub = document.getElementById('sub-' + id);
            let amt = parseInt(document.getElementById('bet-amount-' + id).value);
            let currentBet = id === 1 ? bet1 : bet2;

            if (!isFlightInProgress && currentBet.status === 'idle') {
                if (balance >= amt) {
                    currentBet.amount = amt;
                    currentBet.status = 'waiting';
                    btn.childNodes[0].nodeValue = "WAITING";
                    sub.innerText = "Cancel";
                    btn.className = "bet-button waiting";
                }
            } else if (!isFlightInProgress && currentBet.status === 'waiting') {
                currentBet.status = 'idle';
                btn.childNodes[0].nodeValue = "BET";
                sub.innerText = amt.toFixed(2) + " ETB";
                btn.className = "bet-button";
            } else if (isFlightInProgress && currentBet.status === 'active') {
                triggerCashoutSuccess(id);
            }
        }

        function triggerCashoutSuccess(id) {
            let currentBet = id === 1 ? bet1 : bet2;
            let btn = document.getElementById('btn-' + id);
            let sub = document.getElementById('sub-' + id);
            let amt = parseInt(document.getElementById('bet-amount-' + id).value);

            let winAmt = currentBet.amount * currentMultiplier;
            balance += winAmt;
            balanceElement.innerText = balance.toFixed(2) + " ETB";
            currentBet.status = 'idle';
            btn.childNodes[0].nodeValue = "BET";
            sub.innerText = amt.toFixed(2) + " ETB";
            btn.className = "bet-button";
            alert("እንኳን ደስ አሰኞት! +" + winAmt.toFixed(2) + " ETB በ " + currentMultiplier + "x አሸንፈዋል!");
        }

        function handleRoundStartBets() {
            [1, 2].forEach(id => {
                let currentBet = id === 1 ? bet1 : bet2;
                let btn = document.getElementById('btn-' + id);
                let sub = document.getElementById('sub-' + id);
                if (currentBet.status === 'waiting') {
                    balance -= currentBet.amount;
                    balanceElement.innerText = balance.toFixed(2) + " ETB";
                    currentBet.status = 'active';
                    btn.childNodes[0].nodeValue = "CASH OUT";
                    btn.className = "bet-button cashout";
                }
            });
        }

        function updateCashoutLabels() {
            if (bet1.status === 'active') document.getElementById('sub-1').innerText = (bet1.amount * currentMultiplier).toFixed(2) + " ETB";
            if (bet2.status === 'active') document.getElementById('sub-2').innerText = (bet2.amount * currentMultiplier).toFixed(2) + " ETB";
        }

        function resetPanels() {
            [1, 2].forEach(id => {
                let currentBet = id === 1 ? bet1 : bet2;
                if(currentBet.status !== 'waiting') {
                    let btn = document.getElementById('btn-' + id);
                    let sub = document.getElementById('sub-' + id);
                    let amt = document.getElementById('bet-amount-' + id).value;
                    btn.childNodes[0].nodeValue = "BET";
                    sub.innerText = parseFloat(amt).toFixed(2) + " ETB";
                    btn.className = "bet-button";
                }
            });
            bet1 = { amount: 0, status: 'idle' };
            bet2 = { amount: 0, status: 'idle' };
        }

        function adjustAmount(id, val) {
            let input = document.getElementById('bet-amount-' + id);
            let current = parseInt(input.value) || 0;
            if (current + val >= 1) {
                input.value = current + val;
                updateButtonSub(id, current + val);
            }
        }

        function multiplyAmount(id, factor) {
            let input = document.getElementById('bet-amount-' + id);
            let current = parseInt(input.value) || 0;
            let newVal = Math.max(1, Math.round(current * factor));
            input.value = newVal;
            updateButtonSub(id, newVal);
        }

        function setAmount(id, val) {
            document.getElementById('bet-amount-' + id).value = val;
            updateButtonSub(id, val);
        }

        function updateButtonSub(id, val) {
            let currentBet = id === 1 ? bet1 : bet2;
            if (currentBet.status === 'idle') {
                document.getElementById('sub-' + id).innerText = parseFloat(val).toFixed(2) + " ETB";
            }
        }

        window.onload = function() {
            renderHistory();
            drawGame();
            startWaitingPeriod();
        }
    </script>
</body>
</html>
