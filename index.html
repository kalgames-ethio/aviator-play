<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalgames Aviator</title>
    <style>
        body { 
            margin: 0; 
            background-color: #101115; 
            color: #fff; 
            font-family: 'Roboto', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            -webkit-user-select: none; 
            user-select: none; 
        }
        
        /* Header */
        .top-bar { 
            width: 100%; 
            max-width: 380px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 14px; 
            box-sizing: border-box; 
            background: #1b1c21; 
            border-bottom: 2px solid #141519; 
        }
        .logo { 
            font-size: 18px; 
            font-weight: 900; 
            color: #cb0130; 
            font-style: italic; 
            letter-spacing: 0.5px; 
        }
        .balance { 
            font-size: 15px; 
            color: #2cba42; 
            font-weight: bold; 
            background: #101115; 
            padding: 6px 14px; 
            border-radius: 20px; 
            border: 1px solid #2c2c2e; 
        }

        /* History Bar */
        #history-bar { 
            display: flex; 
            gap: 6px; 
            width: 100%; 
            max-width: 380px; 
            padding: 8px 12px; 
            overflow-x: auto; 
            background: #141519; 
            box-sizing: border-box; 
            scrollbar-width: none; 
        }
        #history-bar::-webkit-scrollbar { display: none; }
        .hist-item { 
            padding: 3px 9px; 
            border-radius: 10px; 
            font-size: 11px; 
            font-weight: bold; 
            color: #fff; 
            background: #1b1c21; 
            min-width: 45px; 
            text-align: center; 
            border: 1px solid #232429; 
        }
        .high { color: #c146e3; background: rgba(193, 70, 227, 0.15); border-color: rgba(193, 70, 227, 0.4); }
        .low { color: #3498db; background: rgba(52, 152, 219, 0.15); border-color: rgba(52, 152, 219, 0.4); }

        /* Canvas screen */
        .game-canvas-area { 
            position: relative; 
            width: 95%; 
            max-width: 365px; 
            height: 215px; 
            margin-top: 8px; 
            background: #101115; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #232429; 
        }
        #gameCanvas { width: 100%; height: 100%; display: block; }
        
        #multiplier-overlay { 
            position: absolute; 
            top: 28%; 
            left: 0; 
            width: 100%; 
            text-align: center; 
            font-size: 52px; 
            font-weight: 900; 
            color: #fff; 
            z-index: 10; 
            font-family: sans-serif; 
            text-shadow: 0 4px 15px rgba(0,0,0,0.9); 
        }
        .status-msg { 
            font-size: 13px; 
            color: #c2c2c2; 
            position: absolute; 
            bottom: 25px; 
            width: 100%; 
            text-align: center; 
            z-index: 10; 
            font-weight: 500; 
        }

        /* Betting Area */
        .bet-area { 
            width: 95%; 
            max-width: 365px; 
            margin-top: 10px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            box-sizing: border-box; 
        }
        .bet-panel { 
            background: #1b1c21; 
            padding: 12px; 
            border-radius: 14px; 
            border: 1px solid #232429; 
            display: grid; 
            grid-template-columns: 1fr 1.1fr; 
            gap: 12px; 
            box-sizing: border-box; 
        }
        
        .controls-left { 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
            width: 100%; 
        }
        .amount-control { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: #101115; 
            border-radius: 6px; 
            padding: 4px 8px; 
            border: 1px solid #2d303a; 
            height: 38px; 
            box-sizing: border-box; 
        }
        .minus-btn, .plus-btn { 
            background: #232429; 
            border: none; 
            color: #fff; 
            width: 26px; 
            height: 26px; 
            border-radius: 50%; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .amount-input { 
            background: none; 
            border: none; 
            color: #fff; 
            font-size: 16px; 
            font-weight: bold; 
            width: 55px; 
            text-align: center; 
            outline: none; 
        }
        
        .quick-chips { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 4px; 
        }
        .chip-btn { 
            background: #101115; 
            border: 1px solid #232429; 
            color: #9a9da4; 
            padding: 5px 0; 
            font-size: 12px; 
            font-weight: bold; 
            border-radius: 4px; 
            cursor: pointer; 
            text-align: center; 
        }

        /* 🟢 እውነተኛው ደማቅ ሎሚ አረንጓዴ (Neon Lime Green) አዝራር */
        .btn-container { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            height: 100%; 
        }
        .bet-button { 
            background: #2ccb4a; /* እውነተኛ ደማቅ አረንጓዴ */
            color: #fff; 
            border: none; 
            border-radius: 12px; 
            width: 100%; 
            height: 100%; 
            min-height: 76px; 
            font-size: 22px; 
            font-weight: 900; 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            line-height: 1.2; 
            box-shadow: 0 4px 12px rgba(44, 203, 74, 0.35);
        }
        .bet-button span { 
            font-size: 14px; 
            font-weight: bold; 
            color: #fff; 
            margin-top: 2px; 
        }
        
        .bet-button.waiting { background: #e67e22; box-shadow: 0 4px 10px rgba(230, 126, 34, 0.3); }
        .bet-button.cashout { background: #cb0130; box-shadow: 0 4px 10px rgba(203, 1, 48, 0.3); }
    </style>
</head>
<body>

    <div class="top-bar">
        <span class="logo">Aviator</span>
        <span class="balance" id="player-balance">1,000.00 ETB</span>
    </div>

    <div id="history-bar"></div>

    <div class="game-canvas-area">
        <canvas id="gameCanvas" width="365" height="215"></canvas>
        <div id="multiplier-overlay">1.00x</div>
        <div class="status-msg" id="status-text">አውሮፕላኑ እየተዘጋጀ ነው...</div>
    </div>

    <div class="bet-area">
        <div class="bet-panel">
            <div class="controls-left">
                <div class="amount-control">
                    <button class="minus-btn" onclick="adjustAmount(1, -1)">-</button>
                    <input type="number" class="amount-input" id="bet-amount-1" value="4">
                    <button class="plus-btn" onclick="adjustAmount(1, 1)">+</button>
                </div>
                <div class="quick-chips">
                    <button class="chip-btn" onclick="setAmount(1, 4)">4</button>
                    <button class="chip-btn" onclick="setAmount(1, 10)">10</button>
                    <button class="chip-btn" onclick="setAmount(1, 40)">40</button>
                    <button class="chip-btn" onclick="setAmount(1, 100)">100</button>
                </div>
            </div>
            <div class="btn-container">
                <button class="bet-button" id="btn-1" onclick="placeBet(1)">BET<br><span id="sub-1">4.00 ETB</span></button>
            </div>
        </div>

        <div class="bet-panel">
            <div class="controls-left">
                <div class="amount-control">
                    <button class="minus-btn" onclick="adjustAmount(2, -1)">-</button>
                    <input type="number" class="amount-input" id="bet-amount-2" value="4">
                    <button class="plus-btn" onclick="adjustAmount(2, 1)">+</button>
                </div>
                <div class="quick-chips">
                    <button class="chip-btn" onclick="setAmount(2, 4)">4</button>
                    <button class="chip-btn" onclick="setAmount(2, 10)">10</button>
                    <button class="chip-btn" onclick="setAmount(2, 40)">40</button>
                    <button class="chip-btn" onclick="setAmount(2, 100)">100</button>
                </div>
            </div>
            <div class="btn-container">
                <button class="bet-button" id="btn-2" onclick="placeBet(2)">BET<br><span id="sub-2">4.00 ETB</span></button>
            </div>
        </div>
    </div>

    <script>
        const balanceElement = document.getElementById('player-balance');
        const historyContainer = document.getElementById('history-bar');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const multiplierOverlay = document.getElementById('multiplier-overlay');
        const statusText = document.getElementById('status-text');

        let balance = 1000.00;
        let isFlightInProgress = false;
        let currentMultiplier = 1.00;
        let crashPoint = 0;
        let flightTime = 0;
        
        let bet1 = { amount: 0, status: 'idle' };
        let bet2 = { amount: 0, status: 'idle' };

        const pastResults = [1.25, 4.12, 1.02, 2.17, 1.86, 1.13];
        function renderHistory() {
            historyContainer.innerHTML = '';
            pastResults.slice(-7).reverse().forEach(res => {
                const item = document.createElement('div');
                item.className = 'hist-item ' + (res >= 2 ? 'high' : 'low');
                item.innerText = res.toFixed(2) + 'x';
                historyContainer.appendChild(item);
            });
        }

        // 🔵 የተስተካከሉ የጀርባ ጨረሮች - ልክ እንደ ዋናው ጨለምለም ያሉ (Subtle Background Rays)
        function drawBackgroundRays() {
            ctx.fillStyle = '#111216';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);

            const numRays = 32;
            const rayAngle = (Math.PI * 2) / numRays;
            
            for (let i = 0; i < numRays; i++) {
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, 400, i * rayAngle, (i + 1) * rayAngle);
                ctx.lineTo(0, 0);
                // ይበልጥ ጨለምለም ያሉ ቀለማት
                ctx.fillStyle = i % 2 === 0 ? '#15171d' : '#101115';
                ctx.fill();
            }
            ctx.restore();

            // ነጠብጣብ መስመሮች
            ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
            for (let x = 25; x < canvas.width; x += 16) {
                ctx.fillRect(x, canvas.height - 15, 1.5, 1.5);
            }
            for (let y = 15; y < canvas.height - 15; y += 16) {
                ctx.fillRect(20, y, 1.5, 1.5);
            }
        }

        // ✈️ 100% እውነተኛ የኤቪዬተር ጄት አውሮፕላን (Super Sonic Jet Drawing)
        function drawJetPlane(x, y) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(-0.04); // የጄት አቅጣጫ

            ctx.fillStyle = '#cb0130'; // ዋና ቀይ
            ctx.strokeStyle = '#ef1c4f';
            ctx.lineWidth = 1;
            
            // የጄት ዋናው አካል (Sleek Jet Fuselage)
            ctx.beginPath();
            ctx.moveTo(25, 0); // ሹል አፍንጫ
            ctx.quadraticCurveTo(10, -5, -15, -4); // የላይኛው አካል
            ctx.lineTo(-22, -10); // ጭራ ላይ ወደ ላይ
            ctx.lineTo(-25, -10);
            ctx.lineTo(-22, 0); // የጭራ መሃል
            ctx.lineTo(-25, 10);
            ctx.lineTo(-22, 10);
            ctx.quadraticCurveTo(-15, 5, 25, 0); // የታችኛው አካል
            ctx.fill();
            ctx.stroke();

            // ወደ ኋላ ያዘነበሉ የጄት ክንፎች (Swept-back Jet Wings)
            ctx.fillStyle = '#b00128'; // በትንሹ ጠቆር ያለ ቀይ ለክንፍ
            ctx.beginPath();
            ctx.moveTo(-2, -3);
            ctx.lineTo(-12, -22); // ወደ ኋላ ያዘነበለ የግራ ክንፍ
            ctx.lineTo(-18, -22);
            ctx.lineTo(-8, -3);
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(-2, 3);
            ctx.lineTo(-12, 22); // ወደ ኋላ ያዘነበለ የቀኝ ክንፍ
            ctx.lineTo(-18, 22);
            ctx.lineTo(-8, 3);
            ctx.fill();
            ctx.stroke();

            // የጄት ሞተር ማስተንፈሻ ነጭ ብርሃን (Thrust Glow)
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.beginPath();
            ctx.arc(-23, 0, 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function drawGame() {
            drawBackgroundRays();
            
            if (isFlightInProgress) {
                let points = [];
                // 📍 የግራፉ መነሻ ከግራ መስመር በትንሹ ከፍ ብሎ እንዲነሳ ተደርጓል (+38)
                for (let i = 0; i <= flightTime; i++) {
                    let x = 25 + (i / 180) * (canvas.width - 65);
                    let y = (canvas.height - 38) - (Math.pow(i / 100, 2.3) * 22);
                    points.push({x: x, y: y});
                }

                if (points.length > 1) {
                    // የጀርባው ስስ ቀይ ጥላ
                    ctx.beginPath();
                    ctx.moveTo(25, canvas.height - 20);
                    points.forEach(p => ctx.lineTo(p.x, p.y));
                    ctx.lineTo(points[points.length - 1].x, canvas.height - 20);
                    ctx.closePath();
                    
                    let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                    gradient.addColorStop(0, 'rgba(203, 1, 48, 0.22)');
                    gradient.addColorStop(1, 'rgba(203, 1, 48, 0.0)');
                    ctx.fillStyle = gradient;
                    ctx.fill();

                    // 📈 እውነተኛ ስስ እና ደማቅ ቀይ ጥምዝ መስመር
                    ctx.beginPath();
                    ctx.moveTo(points[0].x, points[0].y);
                    points.forEach(p => ctx.lineTo(p.x, p.y));
                    ctx.strokeStyle = '#df0237';
                    ctx.lineWidth = 2.5; // ይበልጥ ቀጭንና እውነተኛ መስመር
                    ctx.stroke();
                }

                let lastPoint = points[points.length - 1];
                if (lastPoint.x < canvas.width && lastPoint.y > 0) {
                    drawJetPlane(lastPoint.x, lastPoint.y); // አዲሱን ጄት መሳል
                }
            }
        }

        function startNewRound() {
            flightTime = 0;
            currentMultiplier = 1.00;
            
            let rand = Math.random();
            if (rand < 0.08) crashPoint = 1.00; 
            else crashPoint = (1 + 9 * Math.random()).toFixed(2); 

            isFlightInProgress = true;
            statusText.innerText = "";
            multiplierOverlay.style.color = "#fff";

            handleRoundStartBets();
            flightSequence();
        }

        function flightSequence() {
            if (currentMultiplier < crashPoint && isFlightInProgress) {
                flightTime += 0.45;
                currentMultiplier = (1.00 + Math.pow(flightTime / 70, 2)).toFixed(2);
                multiplierOverlay.innerText = currentMultiplier + "x";
                
                updateCashoutLabels();
                drawGame();
                requestAnimationFrame(flightSequence);
            } else if (isFlightInProgress) {
                endRound();
            }
        }

        function endRound() {
            isFlightInProgress = false;
            multiplierOverlay.innerText = "FLEW AWAY!";
            multiplierOverlay.style.color = "#cb0130";
            statusText.innerText = "ቀጣይ ዙር በ 4 ሰከንድ ውስጥ ይጀምራል...";
            
            pastResults.push(parseFloat(currentMultiplier));
            renderHistory();

            resetPanels();
            setTimeout(startNewRound, 4000);
        }

        function placeBet(id) {
            let btn = document.getElementById('btn-' + id);
            let sub = document.getElementById('sub-' + id);
            let amt = parseInt(document.getElementById('bet-amount-' + id).value);
            let currentBet = id === 1 ? bet1 : bet2;

            if (!isFlightInProgress && currentBet.status === 'idle') {
                if (balance >= amt) {
                    currentBet.amount = amt;
                    currentBet.status = 'waiting';
                    btn.childNodes[0].nodeValue = "WAITING";
                    sub.innerText = "Cancel";
                    btn.className = "bet-button waiting";
                }
            } else if (!isFlightInProgress && currentBet.status === 'waiting') {
                currentBet.status = 'idle';
                btn.childNodes[0].nodeValue = "BET";
                sub.innerText = amt.toFixed(2) + " ETB";
                btn.className = "bet-button";
            } else if (isFlightInProgress && currentBet.status === 'active') {
                let winAmt = currentBet.amount * currentMultiplier;
                balance += winAmt;
                balanceElement.innerText = balance.toFixed(2) + " ETB";
                currentBet.status = 'idle';
                btn.childNodes[0].nodeValue = "BET";
                sub.innerText = amt.toFixed(2) + " ETB";
                btn.className = "bet-button";
                alert("አሸንፈዋል! +" + winAmt.toFixed(2) + " ETB");
            }
        }

        function handleRoundStartBets() {
            [1, 2].forEach(id => {
                let currentBet = id === 1 ? bet1 : bet2;
                let btn = document.getElementById('btn-' + id);
                let sub = document.getElementById('sub-' + id);
                if (currentBet.status === 'waiting') {
                    balance -= currentBet.amount;
                    balanceElement.innerText = balance.toFixed(2) + " ETB";
                    currentBet.status = 'active';
                    btn.childNodes[0].nodeValue = "CASH OUT";
                    btn.className = "bet-button cashout";
                }
            });
        }

        function updateCashoutLabels() {
            if (bet1.status === 'active') document.getElementById('sub-1').innerText = (bet1.amount * currentMultiplier).toFixed(2) + " ETB";
            if (bet2.status === 'active') document.getElementById('sub-2').innerText = (bet2.amount * currentMultiplier).toFixed(2) + " ETB";
        }

        function resetPanels() {
            [1, 2].forEach(id => {
                let currentBet = id === 1 ? bet1 : bet2;
                if(currentBet.status !== 'waiting') {
                    let btn = document.getElementById('btn-' + id);
                    let sub = document.getElementById('sub-' + id);
                    let amt = document.getElementById('bet-amount-' + id).value;
                    btn.childNodes[0].nodeValue = "BET";
                    sub.innerText = parseFloat(amt).toFixed(2) + " ETB";
                    btn.className = "bet-button";
                }
            });
            bet1 = { amount: 0, status: 'idle' };
            bet2 = { amount: 0, status: 'idle' };
        }

        function adjustAmount(id, val) {
            let input = document.getElementById('bet-amount-' + id);
            let current = parseInt(input.value) || 0;
            if (current + val >= 1) {
                input.value = current + val;
                updateButtonSub(id, current + val);
            }
        }

        function setAmount(id, val) {
            document.getElementById('bet-amount-' + id).value = val;
            updateButtonSub(id, val);
        }

        function updateButtonSub(id, val) {
            let currentBet = id === 1 ? bet1 : bet2;
            if (currentBet.status === 'idle') {
                document.getElementById('sub-' + id).innerText = parseFloat(val).toFixed(2) + " ETB";
            }
        }

        window.onload = function() {
            renderHistory();
            drawBackgroundRays();
            startNewRound();
        }
    </script>
</body>
</html>
