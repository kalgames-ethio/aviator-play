<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalgames Aviator Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b0e11;
    color:white;
    overflow-x:hidden;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:#141921;
    border-bottom:1px solid #222;
}

.logo{
    font-size:22px;
    font-weight:bold;
}

.logo span{
    color:#cb0130;
}

.balance{
    background:#1d2430;
    padding:8px 15px;
    border-radius:20px;
    color:#2ccb4a;
    font-weight:bold;
}

.container{
    padding:15px;
    max-width:1100px;
    margin:auto;
}

.history{
    display:flex;
    gap:8px;
    overflow-x:auto;
    margin-bottom:10px;
}

.history span{
    padding:5px 10px;
    background:#1d2430;
    border-radius:12px;
    font-size:12px;
}

.game-box{
    position:relative;
    background:#141921;
    height:300px;
    border-radius:12px;
    overflow:hidden;
    border:1px solid #222;
}

canvas{
    width:100%;
    height:100%;
}

.multiplier{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:48px;
    font-weight:bold;
    color:white;
    text-shadow:0 0 20px red;
}

.bet-panels{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-top:15px;
}

.panel{
    background:#181c22;
    padding:15px;
    border-radius:12px;
    border:1px solid #222;
}

.bet-input{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border:none;
    border-radius:8px;
    background:#0b0e11;
    color:white;
    font-size:18px;
}

.bet-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:10px;
    background:#2ccb4a;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.bet-btn.running{
    background:#cb0130;
}

.sidebar{
    margin-top:20px;
    background:#181c22;
    padding:15px;
    border-radius:12px;
}

.list-item{
    display:flex;
    justify-content:space-between;
    padding:6px 0;
    border-bottom:1px solid #222;
    font-size:13px;
}

@media(max-width:700px){
    .bet-panels{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<div class="top-bar">
    <div class="logo">🚀 Aviator <span>Pro</span></div>
    <div class="balance"><span id="balance">1000.00</span> ETB</div>
</div>

<div class="container">

    <div class="history" id="history"></div>

    <div class="game-box">
        <div class="multiplier" id="multiplier">Waiting...</div>
        <canvas id="canvas"></canvas>
    </div>

    <div class="bet-panels">

        <div class="panel">
            <input type="number" id="bet1" class="bet-input" value="40">
            <button class="bet-btn" id="btn1" onclick="bet(1)">BET</button>
        </div>

        <div class="panel">
            <input type="number" id="bet2" class="bet-input" value="40">
            <button class="bet-btn" id="btn2" onclick="bet(2)">BET</button>
        </div>

    </div>

    <div class="sidebar">
        <h3 style="margin-bottom:10px;">Live Bets</h3>
        <div id="live-board"></div>
    </div>

</div>

<script>

let balance = 1000;
let gameState = "waiting";
let multiplier = 1;
let crashPoint = 2;

let bet1 = {
    active:false,
    amount:0
};

let bet2 = {
    active:false,
    amount:0
};

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
}

resizeCanvas();
window.addEventListener("resize",resizeCanvas);

function updateBalance(){
    document.getElementById("balance").innerText = balance.toFixed(2);
}

function addHistory(val){
    const history = document.getElementById("history");
    const item = document.createElement("span");
    item.innerText = val.toFixed(2)+"x";
    history.prepend(item);

    if(history.children.length > 10){
        history.removeChild(history.lastChild);
    }
}

function randomCrash(){
    let r = Math.random();

    if(r < 0.5){
        return (1 + Math.random()*2).toFixed(2);
    }

    return (2 + Math.random()*8).toFixed(2);
}

function bet(id){

    let obj = id === 1 ? bet1 : bet2;
    let input = document.getElementById("bet"+id);
    let btn = document.getElementById("btn"+id);

    let amount = parseFloat(input.value);

    if(gameState === "waiting" && !obj.active){

        if(amount > balance){
            alert("Insufficient Balance");
            return;
        }

        balance -= amount;
        updateBalance();

        obj.active = true;
        obj.amount = amount;

        btn.innerText = "WAITING";
    }

    else if(gameState === "running" && obj.active){

        let win = obj.amount * multiplier;

        balance += win;
        updateBalance();

        obj.active = false;
        obj.amount = 0;

        btn.innerText = "BET";
        btn.classList.remove("running");

        alert("Won " + win.toFixed(2) + " ETB");
    }
}

function startRound(){

    gameState = "running";
    multiplier = 1;
    crashPoint = parseFloat(randomCrash());

    if(bet1.active){
        document.getElementById("btn1").innerText = "CASH OUT";
        document.getElementById("btn1").classList.add("running");
    }

    if(bet2.active){
        document.getElementById("btn2").innerText = "CASH OUT";
        document.getElementById("btn2").classList.add("running");
    }
}

function endRound(){

    gameState = "waiting";

    addHistory(multiplier);

    document.getElementById("multiplier").innerText = multiplier.toFixed(2)+"x";

    bet1.active = false;
    bet2.active = false;

    document.getElementById("btn1").innerText = "BET";
    document.getElementById("btn2").innerText = "BET";

    document.getElementById("btn1").classList.remove("running");
    document.getElementById("btn2").classList.remove("running");

    setTimeout(()=>{
        document.getElementById("multiplier").innerText = "Waiting...";
        setTimeout(startRound,3000);
    },3000);
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle = "red";
    ctx.lineWidth = 4;

    ctx.beginPath();

    for(let i=0;i<multiplier*80;i++){

        let x = 50 + i;
        let y = canvas.height - 50 - Math.pow(i*0.08,1.5);

        if(i===0){
            ctx.moveTo(x,y);
        }
        else{
            ctx.lineTo(x,y);
        }
    }

    ctx.stroke();

    let planeX = 50 + multiplier*80;
    let planeY = canvas.height - 50 - Math.pow(multiplier*80*0.08,1.5);

    ctx.font = "32px Arial";
    ctx.fillText("✈️",planeX,planeY);

    if(gameState === "running"){

        multiplier += 0.01;

        document.getElementById("multiplier").innerText = multiplier.toFixed(2)+"x";

        if(multiplier >= crashPoint){
            endRound();
        }
    }

    requestAnimationFrame(draw);
}

function updateLiveBoard(){

    const board = document.getElementById("live-board");

    board.innerHTML = "";

    for(let i=0;i<5;i++){

        const div = document.createElement("div");
        div.className = "list-item";

        let user = "Player" + Math.floor(Math.random()*999);
        let amount = Math.floor(Math.random()*500);
        let cash = (1+Math.random()*5).toFixed(2);

        div.innerHTML = `
            <span>${user}</span>
            <span>${amount} ETB</span>
            <span style="color:#2ccb4a">${cash}x</span>
        `;

        board.appendChild(div);
    }
}

setInterval(updateLiveBoard,3000);

updateBalance();
updateLiveBoard();
setTimeout(startRound,3000);
draw();

</script>

</body>
</html>
