<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalgames Aviator</title>
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: 'Roboto', sans-serif; display: flex; flex-direction: column; align-items: center; -webkit-user-select: none; user-select: none; }
        
        /* የላይኛው ባር */
        .top-bar { width: 100%; max-width: 380px; display: flex; justify-content: space-between; align-items: center; padding: 12px; box-sizing: border-box; background: #1c1c1e; border-bottom: 1px solid #2c2c2e; }
        .logo { font-size: 20px; font-weight: bold; color: #e91e63; font-style: italic; }
        .balance { font-size: 16px; color: #2cba42; font-weight: bold; background: #252525; padding: 5px 12px; border-radius: 20px; }

        /* የታሪክ ባር */
        #history-bar { display: flex; gap: 6px; width: 100%; max-width: 380px; padding: 8px; overflow-x: auto; background: #18181c; box-sizing: border-box; }
        .hist-item { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; color: #fff; background: #2c2c2e; min-width: 48px; text-align: center; }
        .high { color: #c146e3; background: rgba(193, 70, 227, 0.2); border: 1px solid #c146e3; }
        .low { color: #3498db; background: rgba(52, 152, 219, 0.2); border: 1px solid #3498db; }

        /* የጨዋታው ሜዳ (Canvas Area) */
        .game-canvas-area { position: relative; width: 95%; max-width: 360px; height: 210px; margin-top: 12px; background: #0c0c0e; border-radius: 16px; overflow: hidden; border: 1px solid #232328; }
        #gameCanvas { width: 100%; height: 100%; display: block; }
        #multiplier-overlay { position: absolute; top: 30%; left: 0; width: 100%; text-align: center; font-size: 52px; font-weight: 900; color: #fff; z-index: 10; font-family: sans-serif; }
        .status-msg { font-size: 14px; color: #8e8e93; position: absolute; bottom: 15px; width: 100%; text-align: center; z-index: 10; font-weight: 500; }

        /* የመወራረጃ ክፍሎች */
        .bet-area { width: 95%; max-width: 360px; margin-top: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .bet-panel { background: #1c1c1e; padding: 14px; border-radius: 14px; border: 1px solid #2c2c2e; display: flex; flex-direction: column; align-items: center; box-sizing: border-box; }
        .amount-control { display: flex; align-items: center; justify-content: space-between; width: 100%; background: #0c0c0e; border-radius: 8px; padding: 8px; box-sizing: border-box; margin-bottom: 10px; border: 1px solid #2c2c2e; }
        .currency { color: #e91e63; font-weight: bold; font-size: 13px; }
        .amount-input { background: none; border: none; color: #fff; font-size: 1.3rem; font-weight: bold; width: 70%; text-align: center; outline: none; }
        
        /* አዝራሮች */
        .bet-button { background-color: #2cba42; color: white; border: none; padding: 14px; font-size: 1.3rem; font-weight: bold; border-radius: 10px; width: 100%; cursor: pointer; box-shadow: 0 4px 12px rgba(44, 186, 66, 0.4); text-transform: uppercase; }
        .bet-button.waiting { background-color: #e67e22; box-shadow: 0 4px 12px rgba(230, 126, 34, 0.4); }
        .bet-button.cashout { background-color: #cb0130; box-shadow: 0 4px 12px rgba(203, 1, 48, 0.4); }
    </style>
</head>
<body>

    <div class="top-bar">
        <span class="logo">Aviator</span>
        <span class="balance" id="player-balance">1,000.00 ETB</span>
    </div>

    <div id="history-bar"></div>

    <div class="game-canvas-area">
        <canvas id="gameCanvas" width="360" height="210"></canvas>
        <div id="multiplier-overlay">1.00x</div>
        <div class="status-msg" id="status-text">አውሮፕላኑ እየተዘጋጀ ነው...</div>
    </div>

    <div class="bet-area">
        <div class="bet-panel">
            <div class="amount-control">
                <span class="currency">ETB</span>
                <input type="number" class="amount-input" id="bet-amount-1" value="10">
            </div>
            <button class="bet-button" id="btn-1" onclick="placeBet(1)">Bet</button>
        </div>
        <div class="bet-panel">
            <div class="amount-control">
                <span class="currency">ETB</span>
                <input type="number" class="amount-input" id="bet-amount-2" value="20">
            </div>
            <button class="bet-button" id="btn-2" onclick="placeBet(2)">Bet</button>
        </div>
    </div>

    <script>
        const balanceElement = document.getElementById('player-balance');
        const historyContainer = document.getElementById('history-bar');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const multiplierOverlay = document.getElementById('multiplier-overlay');
        const statusText = document.getElementById('status-text');

        let balance = 1000.00;
        let isFlightInProgress = false;
        let currentMultiplier = 1.00;
        let crashPoint = 0;
        let flightTime = 0;
        
        let bet1 = { amount: 0, status: 'idle' };
        let bet2 = { amount: 0, status: 'idle' };

        const pastResults = [1.45, 2.87, 1.12, 5.40, 1.86, 2.27];
        function renderHistory() {
            historyContainer.innerHTML = '';
            pastResults.slice(-6).reverse().forEach(res => {
                const item = document.createElement('div');
                item.className = 'hist-item ' + (res >= 2 ? 'high' : 'low');
                item.innerText = res.toFixed(2) + 'x';
                historyContainer.appendChild(item);
            });
        }

        // 🔴 አውሮፕላኑን በብሩሽ (Vector) በቀጥታ በደማቅ ቀይ ቀለም የመሳያ ተግባር
        function drawRedPlane(x, y) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(-0.15); // አውሮፕላኑን ወደ ላይ ማዘንበል

            ctx.fillStyle = '#e91e63'; // 100% ደማቅ የኤቪዬተር ቀይ ቀለም
            ctx.strokeStyle = '#ff4081';
            ctx.lineWidth = 1;
            ctx.beginPath();
            
            // የዋናው አካል ቅርጽ (Fuselage)
            ctx.moveTo(20, 0);
            ctx.quadraticCurveTo(10, -8, -15, -6);
            ctx.lineTo(-18, -12);
            ctx.lineTo(-22, -12);
            ctx.lineTo(-20, -2); // ጭራ
            ctx.lineTo(-22, 5);
            ctx.lineTo(-17, 5);
            ctx.lineTo(-14, 6);
            ctx.quadraticCurveTo(10, 8, 20, 0);
            ctx.fill();
            ctx.stroke();

            // የጎን ክንፍ (Main Wing)
            ctx.beginPath();
            ctx.moveTo(0, -3);
            ctx.lineTo(8, -22);
            ctx.lineTo(2, -22);
            ctx.lineTo(-6, -3);
            ctx.fill();
            ctx.stroke();

            // የታችኛው ክንፍ
            ctx.beginPath();
            ctx.moveTo(0, 3);
            ctx.lineTo(8, 22);
            ctx.lineTo(2, 22);
            ctx.lineTo(-6, 3);
            ctx.fill();
            ctx.stroke();

            // የፊት ማራገቢያ (Propeller)
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(22, -10);
            ctx.lineTo(22, 10);
            ctx.stroke();

            ctx.restore();
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (isFlightInProgress) {
                let points = [];
                for (let i = 0; i <= flightTime; i++) {
                    let x = (i / 180) * (canvas.width - 50);
                    let y = canvas.height - 25 - (Math.pow(i / 100, 2.2) * 22);
                    points.push({x: x, y: y});
                }

                if (points.length > 1) {
                    // 1. የጀርባው ደማቅ ቀይ ጥላ (Glow Area)
                    ctx.beginPath();
                    ctx.moveTo(0, canvas.height);
                    points.forEach(p => ctx.lineTo(p.x, p.y));
                    ctx.lineTo(points[points.length - 1].x, canvas.height);
                    ctx.closePath();
                    
                    let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                    gradient.addColorStop(0, 'rgba(233, 30, 99, 0.4)'); // ጥላው ይበልጥ ደምቋል
                    gradient.addColorStop(1, 'rgba(233, 30, 99, 0.0)');
                    ctx.fillStyle = gradient;
                    ctx.fill();

                    // 2. ዋናው ቀይ ጥምዝ መስመር
                    ctx.beginPath();
                    ctx.moveTo(points[0].x, points[0].y);
                    points.forEach(p => ctx.lineTo(p.x, p.y));
                    ctx.strokeStyle = '#e91e63';
                    ctx.lineWidth = 4;
                    ctx.stroke();
                }

                // 3. አውሮፕላኑን በቬክተር መሳል
                let lastPoint = points[points.length - 1];
                if (lastPoint.x < canvas.width && lastPoint.y > 0) {
                    drawRedPlane(lastPoint.x, lastPoint.y);
                }
            }
        }

        function startNewRound() {
            flightTime = 0;
            currentMultiplier = 1.00;
            
            let rand = Math.random();
            if (rand < 0.1) crashPoint = 1.00; 
            else crashPoint = (1 + 7 * Math.random()).toFixed(2); 

            isFlightInProgress = true;
            statusText.innerText = "";
            multiplierOverlay.style.color = "#fff";

            handleRoundStartBets();
            flightSequence();
        }

        function flightSequence() {
            if (currentMultiplier < crashPoint && isFlightInProgress) {
                flightTime += 0.5;
                currentMultiplier = (1.00 + Math.pow(flightTime / 70, 2)).toFixed(2);
                multiplierOverlay.innerText = currentMultiplier + "x";
                
                updateCashoutLabels();
                drawGame();
                requestAnimationFrame(flightSequence);
            } else if (isFlightInProgress) {
                endRound(false);
            }
        }

        function endRound(manual) {
            isFlightInProgress = false;
            multiplierOverlay.innerText = "FLEW AWAY!";
            multiplierOverlay.style.color = "#cb0130";
            statusText.innerText = "ቀጣይ ዙር በ 5 ሰከንድ ውስጥ ይጀምራል...";
            
            if(!manual) {
                pastResults.push(parseFloat(currentMultiplier));
                renderHistory();
            }

            resetPanels();
            setTimeout(startNewRound, 5000);
        }

        function placeBet(id) {
            let btn = document.getElementById('btn-' + id);
            let amt = parseInt(document.getElementById('bet-amount-' + id).value);
            let currentBet = id === 1 ? bet1 : bet2;

            if (!isFlightInProgress && currentBet.status === 'idle') {
                if (balance >= amt) {
                    currentBet.amount = amt;
                    currentBet.status = 'waiting';
                    btn.innerText = "Waiting...";
                    btn.className = "bet-button waiting";
                }
            } else if (isFlightInProgress && currentBet.status === 'active') {
                let winAmt = currentBet.amount * currentMultiplier;
                balance += winAmt;
                balanceElement.innerText = balance.toFixed(2) + " ETB";
                currentBet.status = 'idle';
                btn.innerText = "Bet";
                btn.className = "bet-button";
                alert("አሸንፈዋል! +" + winAmt.toFixed(2) + " ETB");
            }
        }

        function handleRoundStartBets() {
            [1, 2].forEach(id => {
                let currentBet = id === 1 ? bet1 : bet2;
                let btn = document.getElementById('btn-' + id);
                if (currentBet.status === 'waiting') {
                    balance -= currentBet.amount;
                    balanceElement.innerText = balance.toFixed(2) + " ETB";
                    currentBet.status = 'active';
                    btn.className = "bet-button cashout";
                }
            });
        }

        function updateCashoutLabels() {
            if (bet1.status === 'active') document.getElementById('btn-1').innerText = "Cash Out " + (bet1.amount * currentMultiplier).toFixed(2);
            if (bet2.status === 'active') document.getElementById('btn-2').innerText = "Cash Out " + (bet2.amount * currentMultiplier).toFixed(2);
        }

        function resetPanels() {
            bet1 = { amount: 0, status: 'idle' };
            bet2 = { amount: 0, status: 'idle' };
            document.getElementById('btn-1').innerText = "Bet";
            document.getElementById('btn-1').className = "bet-button";
            document.getElementById('btn-2').innerText = "Bet";
            document.getElementById('btn-2').className = "bet-button";
        }

        window.onload = function() {
            renderHistory();
            startNewRound();
        }
    </script>
</body>
</html>
