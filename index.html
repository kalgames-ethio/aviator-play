
<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalgames Aviator</title>
    <style>
        body { margin: 0; background-color: #0c0d12; color: #fff; font-family: 'Roboto', sans-serif; display: flex; flex-direction: column; align-items: center; -webkit-user-select: none; user-select: none; }
        
        /* ከላይ ያለ ባር (Header) */
        .top-bar { width: 100%; max-width: 380px; display: flex; justify-content: space-between; align-items: center; padding: 10px; box-sizing: border-box; background: #1a1b21; border-bottom: 2px solid #141519; }
        .logo { font-size: 20px; font-weight: bold; color: #cb0130; font-style: italic; }
        .right-section { display: flex; align-items: center; gap: 10px; }
        .balance { font-size: 16px; color: #2cba42; font-weight: bold; background: #101115; padding: 5px 12px; border-radius: 20px; border: 1px solid #2d2d2e; }
        .menu-btn { color: #8e8e93; font-size: 20px; cursor: pointer; }

        /* ያለፉ ታሪኮች (History) */
        #history { display: flex; gap: 5px; width: 100%; max-width: 380px; padding: 10px; overflow-x: auto; background: #141519; box-sizing: border-box; scrollbar-width: none; }
        #history::-webkit-scrollbar { display: none; }
        .hist-item { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; color: #fff; background: #2d2d2e; border: 1px solid #3d3d3e; }
        .high { color: #c146e3; background: rgba(193, 70, 227, 0.2); }
        .low { color: #3498db; background: rgba(52, 152, 219, 0.2); }

        /* የጨዋታው ሜዳ (Game Screen) */
        .game-canvas-area { position: relative; width: 95%; max-width: 360px; height: 180px; margin-top: 15px; background: #000; border-radius: 12px; overflow: hidden; border: 2px solid #cb0130; box-shadow: 0 4px 15px rgba(203, 1, 48, 0.2); }
        #gameCanvas { width: 100%; height: 100%; }
        #multiplier-overlay { position: absolute; top: 40%; left: 0; width: 100%; text-align: center; font-size: 55px; font-weight: 900; color: #fff; z-index: 10; text-shadow: 0 0 10px rgba(203, 1, 48, 0.5); }
        .status-msg { font-size: 14px; color: #c2c2c2; position: absolute; bottom: 15px; width: 100%; text-align: center; z-index: 10; }

        /* የመወራረጃ ፓነል (Bet Area) */
        .bet-area { width: 95%; max-width: 360px; margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .bet-panel { background: #1b1c21; padding: 15px; border-radius: 14px; border: 1px solid #2d2d2e; display: flex; flex-direction: column; align-items: center; }
        .controls-left { width: 100%; display: flex; flex-direction: column; gap: 8px; }
        .amount-control { display: flex; align-items: center; justify-content: space-between; width: 100%; background: #101115; border-radius: 8px; padding: 8px 12px; box-sizing: border-box; }
        .currency { color: #cb0130; font-weight: bold; }
        .amount-input { background: none; border: none; color: #fff; font-size: 1.2rem; font-weight: bold; width: 60px; text-align: center; outline: none; }
        .minus-btn, .plus-btn { background: #2d2d2e; border: none; color: #fff; font-size: 1.2rem; font-weight: bold; width: 25px; height: 25px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .quick-chips { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; width: 100%; }
        .chip-btn { background: #101115; border: 1px solid #2d2d2e; color: #fff; padding: 6px 0; font-size: 12px; font-weight: bold; border-radius: 5px; cursor: pointer; text-align: center; }
        
        /* አረንጓዴው BET ቁልፍ */
        .btn-container { width: 100%; margin-top: 12px; }
        .bet-button { background-color: #2cba42; color: white; border: none; padding: 15px; font-size: 1.3rem; font-weight: bold; border-radius: 10px; width: 100%; cursor: pointer; box-shadow: 0 4px 10px rgba(44, 186, 66, 0.3); text-transform: uppercase; line-height: 1.2; }
        .bet-button span { font-size: 12px; font-weight: bold; color: rgba(255, 255, 255, 0.8); margin-top: 2px; display: block; }
        .bet-button.waiting { background-color: #e67e22; }
        .bet-button.cashout { background-color: #cb0130; }
    </style>
</head>
<body>

    <div class="top-bar">
        <span class="logo">Aviator</span>
        <div class="right-section">
            <span class="balance" id="player-balance">1,000.00 ETB</span>
            <span class="menu-btn">&#9776;</span>
        </div>
    </div>

    <div id="history">
        </div>

    <div class="game-canvas-area">
        <canvas id="gameCanvas" width="360" height="180"></canvas>
        <div id="multiplier-overlay">1.00x</div>
        <div class="status-msg" id="status-text">አውሮፕላኑ እየበረረ ነው...</div>
    </div>

    <div class="bet-area">
        <div class="bet-panel">
            <div class="controls-left">
                <div class="amount-control">
                    <button class="minus-btn" onclick="adjustAmount(1, -5)">-</button>
                    <input type="number" class="amount-input" id="bet-amount-1" value="10">
                    <button class="plus-btn" onclick="adjustAmount(1, 5)">+</button>
                </div>
                <div class="quick-chips">
                    <button class="chip-btn" onclick="setAmount(1, 4)">4</button>
                    <button class="chip-btn" onclick="setAmount(1, 10)">10</button>
                    <button class="chip-btn" onclick="setAmount(1, 40)">40</button>
                    <button class="chip-btn" onclick="setAmount(1, 100)">100</button>
                </div>
            </div>
            <div class="btn-container">
                <button class="bet-button" id="btn-1" onclick="placeBet(1)">Bet<br><span id="sub-1">10.00 ETB</span></button>
            </div>
        </div>

        <div class="bet-panel">
            <div class="controls-left">
                <div class="amount-control">
                    <button class="minus-btn" onclick="adjustAmount(2, -5)">-</button>
                    <input type="number" class="amount-input" id="bet-amount-2" value="20">
                    <button class="plus-btn" onclick="adjustAmount(2, 5)">+</button>
                </div>
                <div class="quick-chips">
                    <button class="chip-btn" onclick="setAmount(2, 4)">4</button>
                    <button class="chip-btn" onclick="setAmount(2, 10)">10</button>
                    <button class="chip-btn" onclick="setAmount(2, 40)">40</button>
                    <button class="chip-btn" onclick="setAmount(2, 100)">100</button>
                </div>
            </div>
            <div class="btn-container">
                <button class="bet-button" id="btn-2" onclick="placeBet(2)">Bet<br><span id="sub-2">20.00 ETB</span></button>
            </div>
        </div>
    </div>

    <script>
        const balanceElement = document.getElementById('player-balance');
        const historyContainer = document.getElementById('history');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const multiplierOverlay = document.getElementById('multiplier-overlay');
        const statusText = document.getElementById('status-text');

        let balance = 1000.00;
        let isFlightInProgress = false;
        let currentMultiplier = 1.0;
        let crashPoint = 0;
        let flightTime = 0;
        
        let bet1 = { amount: 0, status: 'idle' };
        let bet2 = { amount: 0, status: 'idle' };

        // ያለፉ ውጤቶች ታሪክ
        const pastResults = [21.46, 1.12, 2.17, 1.42, 1.00, 1.86, 1.13];
        pastResults.forEach(res => {
            const item = document.createElement('div');
            item.className = 'hist-item ' + (res >= 2 ? 'high' : 'low');
            item.innerText = res.toFixed(2) + 'x';
            historyContainer.appendChild(item);
        });

        // የአውሮፕላን ምስል (SVG)
        const planeImg = new Image();
        planeImg.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath fill='%23cb0130' d='M85,50 L45,20 V35 H15 V65 H45 V80 L85,50 Z'/%3E%3C/svg%3E";

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // የጀርባ ጨረሮች
            ctx.fillStyle = '#08080a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for(let i=0; i<15; i++){
                ctx.beginPath();
                ctx.moveTo(20, canvas.height-20);
                ctx.lineTo(20 + i*30, 0);
                ctx.lineTo(20 + (i+1)*30, 0);
                ctx.fillStyle = i%2==0 ? '#0a0a0c' : '#0e0e11';
                ctx.fill();
            }

            // የግራፍ መስመር
            if (isFlightInProgress) {
                ctx.beginPath();
                ctx.moveTo(20, canvas.height-20);
                for (let i = 0; i <= flightTime; i++) {
                    const x = 20 + (i / 150) * (canvas.width - 40);
                    const y = canvas.height - 20 - (Math.pow(1.03, i / 2.5) * 10);
                    if (y > 0) ctx.lineTo(x, y);
                }
                ctx.strokeStyle = '#cb0130';
                ctx.lineWidth = 4;
                ctx.stroke();

                // አውሮፕላን
                const x = 20 + (flightTime / 150) * (canvas.width - 40);
                const y = canvas.height - 20 - (Math.pow(1.03, flightTime / 2.5) * 10) - 15;
                if (x < canvas.width && y > 0) {
                    ctx.drawImage(planeImg, x, y, 30, 30);
                }
            }
        }

        function startNewRound() {
            flightTime = 0;
            currentMultiplier = 1.0;
            
            // የዘፈቀደ የመክሸፊያ ነጥብ (ከ 1.01 እስከ 5.0)
            crashPoint = (Math.random() * 4 + 1.01).toFixed(2);
            
            isFlightInProgress = true;
            statusText.innerText = "አውሮፕላኑ እየበረረ ነው...";
            multiplierOverlay.style.color = "#fff";

            // ውርርድ ማስተካከያ
            handleRoundStartBets();
            
            flightSequence();
        }

        function flightSequence() {
            if (currentMultiplier < crashPoint && isFlightInProgress) {
                flightTime += 0.5;
                currentMultiplier = (1.00 + Math.pow(flightTime / 50, 2)).toFixed(2);
                multiplierOverlay.innerText = currentMultiplier + "x";
                
                // የ Cashout ቁልፍ ላይ የሚሰራውን ብር ማሳየት
                updateCashoutLabels();
                
                drawGame();
                requestAnimationFrame(flightSequence);
            } else if (isFlightInProgress) {
                crashGame();
            }
        }

        function crashGame() {
            isFlightInProgress = false;
            multiplierOverlay.innerText = "FLEW AWAY!";
            multiplierOverlay.style.color = "#cb0130";
            statusText.innerText = "ቀጣይ ዙር በ 5 ሰከንድ ውስጥ ይጀምራል...";
            
            resetPanels();
            setTimeout(startNewRound, 5000);
        }

        // --- ውርርድ (Betting) ሲስተም ---

        function placeBet(id) {
            let btn = document.getElementById('btn-' + id);
            let sub = document.getElementById('sub-' + id);
            let amt = parseInt(document.getElementById('bet-amount-' + id).value);
            let currentBet = id === 1 ? bet1 : bet2;

            if (!isFlightInProgress && currentBet.status === 'idle') {
                if (balance >= amt) {
                    currentBet.amount = amt;
                    currentBet.status = 'waiting';
                    btn.childNodes[0].nodeValue = "Waiting";
                    sub.innerText = "Cancel";
                    btn.className = "bet-button waiting";
                }
            } else if (!isFlightInProgress && currentBet.status === 'waiting') {
                currentBet.status = 'idle';
                btn.childNodes[0].nodeValue = "Bet";
                sub.innerText = amt.toFixed(2) + " ETB";
                btn.className = "bet-button";
            } else if (isFlightInProgress && currentBet.status === 'active') {
                // CASH OUT ማድረግ
                let winAmt = currentBet.amount * currentMultiplier;
                balance += winAmt;
                balanceElement.innerText = balance.toFixed(2) + " ETB";
                currentBet.status = 'idle';
                btn.childNodes[0].nodeValue = "Bet";
                sub.innerText = amt.toFixed(2) + " ETB";
                btn.className = "bet-button";
                alert("አሸንፈዋል! +" + winAmt.toFixed(2) + " ETB");
            }
        }

        function handleRoundStartBets() {
            [1, 2].forEach(id => {
                let currentBet = id === 1 ? bet1 : bet2;
                let btn = document.getElementById('btn-' + id);
                let sub = document.getElementById('sub-' + id);
                if (currentBet.status === 'waiting') {
                    balance -= currentBet.amount;
                    balanceElement.innerText = balance.toFixed(2) + " ETB";
                    currentBet.status = 'active';
                    btn.childNodes[0].nodeValue = "CASH OUT";
                    btn.className = "bet-button cashout";
                }
            });
        }

        function updateCashoutLabels() {
            if (bet1.status === 'active') document.getElementById('sub-1').innerText = (bet1.amount * currentMultiplier).toFixed(2) + " ETB";
            if (bet2.status === 'active') document.getElementById('sub-2').innerText = (bet2.amount * currentMultiplier).toFixed(2) + " ETB";
        }

        function resetPanels() {
            [1, 2].forEach(id => {
                let currentBet = id === 1 ? bet1 : bet2;
                let btn = document.getElementById('btn-' + id);
                let sub = document.getElementById('sub-' + id);
                let amt = document.getElementById('bet-amount-' + id).value;
                btn.childNodes[0].nodeValue = "Bet";
                sub.innerText = parseFloat(amt).toFixed(2) + " ETB";
                btn.className = "bet-button";
                if(currentBet.status==='active') currentBet.status='idle';
            });
        }

        function adjustAmount(id, val) {
            let input = document.getElementById('bet-amount-' + id);
            let current = parseInt(input.value) || 0;
            if (current + val >= 1) {
                input.value = current + val;
                updateButtonSub(id, current + val);
            }
        }

        function setAmount(id, val) {
            document.getElementById('bet-amount-' + id).value = val;
            updateButtonSub(id, val);
        }

        function updateButtonSub(id, val) {
            let currentBet = id === 1 ? bet1 : bet2;
            if (currentBet.status === 'idle') {
                document.getElementById('sub-' + id).innerText = parseFloat(val).toFixed(2) + " ETB";
            }
        }

        // ገጹ ሲጫን አውቶማቲክ እንዲጀምር
        window.onload = startNewRound;
    </script>
</body>
</html>
