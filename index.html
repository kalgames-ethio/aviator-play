<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Game</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #history { width: 100%; max-width: 400px; display: flex; gap: 5px; overflow-x: auto; margin-bottom: 15px; padding: 5px; background: #2a2a2a; border-radius: 8px; }
        .hist-item { padding: 4px 10px; border-radius: 5px; font-size: 13px; font-weight: bold; color: white; }
        .high { background: #9c27b0; }
        .low { background: #2196f3; }
        #game-box { border: 2px solid #ff0044; padding: 20px; border-radius: 15px; text-align: center; width: 90%; max-width: 400px; background: #222; }
        #multiplier { font-size: 55px; margin: 20px 0; font-weight: bold; color: #ff0044; }
    </style>
</head>
<body>
    <div id="history"></div>
    <div id="game-box">
        <div id="multiplier">1.00x</div>
        <p>ጨዋታው በቅርብ ቀን በቦቱ ላይ ይጀምራል!</p>
    </div>
    <script>
        function addHistory(val) {
            let hDiv = document.getElementById('history');
            let item = document.createElement('div');
            item.className = 'hist-item ' + (val >= 2 ? 'high' : 'low');
            item.innerText = val + "x";
            hDiv.prepend(item);
        }
        setInterval(() => {
            let val = (Math.random() * 4 + 1).toFixed(2);
            addHistory(val);
            document.getElementById('multiplier').innerText = val + "x";
        }, 3000);
    </script>
</body>
</html>
<style>
<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Game</title>
    <style>
    body { 
        background: #1a1a1a; 
        color: #fff; 
        font-family: Arial, sans-serif; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        padding: 10px; 
        margin: 0;
    }
    #history { 
        display: flex; 
        gap: 5px; 
        margin-bottom: 15px; 
        overflow-x: auto; 
        width: 90%; 
        max-width: 380px;
        padding: 5px 0;
    }
    .hist-item { 
        padding: 5px 10px; 
        border-radius: 5px; 
        font-size: 11px; 
        font-weight: bold; 
        color: #fff;
    }
    .high { background: #9c27b0; }
    .low { background: #2196f3; }

    #game-box { 
        border: 2px solid #ff003f; 
        border-radius: 15px; 
        padding: 30px 20px; 
        text-align: center; 
        width: 90%; 
        max-width: 380px; 
        background: #151515;
        box-shadow: 0 4px 15px rgba(255, 0, 63, 0.2);
        box-sizing: border-box;
    }
    #multiplier { 
        font-size: 55px; 
        max-width: 380px; 
        font-weight: bold; 
        color: #ff003f; 
        margin-bottom: 15px;
    }
    .status-text {
        font-size: 14px;
        color: #bbb;
    }

    /* የመወራረጃ ሳጥን ማስተካከያ (ልክ እንደ ቀዩ ሳጥን ሰፊ እንዲሆን) */
    .bet-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: #151515;
        padding: 20px;
        border-radius: 15px;
        margin-top: 15px;
        width: 100%;
        max-width: 380px;
        box-sizing: border-box;
        border: 1px solid #2d2d2d;
    }
    .input-group {
        display: flex;
        align-items: center;
        background-color: #252525;
        border-radius: 10px;
        padding: 12px 15px;
        margin-bottom: 15px;
        width: 100%;
        box-sizing: border-box;
    }
    .currency {
        color: #ff003f;
        font-weight: bold;
        margin-right: 15px;
        font-size: 1.2rem;
    }
    #bet-amount {
        background: none;
        border: none;
        color: #fff;
        font-size: 1.4rem;
        font-weight: bold;
        width: 100%;
        outline: none;
        text-align: center;
    }
    #bet-btn {
        background-color: #2cba42;
        color: white;
        border: none;
        padding: 15px;
        font-size: 1.4rem;
        font-weight: bold;
        border-radius: 10px;
        width: 100%;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(44, 186, 66, 0.3);
    }
    #bet-btn:active {
        background-color: #218838;
    }
    </style>
</head>
<body>

    <div id="history"></div>

    <div id="game-box">
        <div id="multiplier">1.00x</div>
        <div class="status-text">ጨዋታው በቅርብ ቀን በቦቱ ላይ ይጀምራል!</div>
    </div>

    <div class="bet-container">
        <div class="input-group">
            <span class="currency">ETB</span>
            <input type="number" id="bet-amount" value="10" min="1">
        </div>
        <button id="bet-btn">BET</button>
    </div>

    <script>
        const historyContainer = document.getElementById('history');
        const multiplierElement = document.getElementById('multiplier');

        // ያለፉ ውጤቶች ታሪክ (History)
        const pastResults = [3.14, 1.58, 4.73, 1.30, 2.59];
        pastResults.forEach(res => {
            const item = document.createElement('div');
            item.className = 'hist-item ' + (res >= 2 ? 'high' : 'low');
            item.innerText = res.toFixed(2) + 'x';
            historyContainer.appendChild(item);
        });

        // ቁጥሩን በየጊዜው ለመቀየር
        setInterval(() => {
            const randomMultiplier = (Math.random() * 5 + 1);
            multiplierElement.innerText = randomMultiplier.toFixed(2) + 'x';
        }, 3000);
    </script>
</body>
</html>
